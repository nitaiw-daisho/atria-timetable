<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atria Wellness Club – Today's Classes</title>
  <style>
    :root {
      --bg:        #0D0D0D;
      --bg2:       #141414;
      --bg3:       #111111;
      --gold:      #C8A84B;
      --gold-dim:  rgba(200,168,75,0.12);
      --gold-line: rgba(200,168,75,0.35);
      --text:      #F2EEE6;
      --text-mid:  rgba(242,238,230,0.6);
      --text-dim:  rgba(242,238,230,0.35);
      --border:    rgba(242,238,230,0.08);
      --font: 'Century Gothic', 'Trebuchet MS', 'Gill Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      overflow: hidden;
    }

    /* ── Utility screens ── */
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      padding: 60px;
      text-align: center;
    }
    .screen img { width: 200px; filter: brightness(1.1); }
    .screen p {
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      max-width: 320px;
      line-height: 1.8;
    }
    .sep { width: 48px; height: 1px; background: var(--gold); opacity: 0.5; }

    .spinner {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main app ── */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header { padding: 40px 44px 26px; flex-shrink: 0; }
    .header img {
      width: 180px;
      display: block;
      margin-bottom: 22px;
      filter: brightness(1.1);
    }
    .header-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--gold) 0%, transparent 60%);
      opacity: 0.45;
      margin-bottom: 16px;
    }
    .header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-date {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-mid);
    }
    .live {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Column headers */
    .col-heads {
      display: grid;
      grid-template-columns: 88px 1fr 110px 72px;
      padding: 11px 44px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .col-head {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
    }

    /* Scrollable list area */
    #classes-list { flex: 1; overflow-y: auto; }
    #classes-list::-webkit-scrollbar { width: 2px; }
    #classes-list::-webkit-scrollbar-thumb { background: var(--gold-line); }

    /* Day divider */
    .day-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 44px 10px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .day-divider-label {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      white-space: nowrap;
    }
    .day-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Class rows */
    .class-row {
      display: grid;
      grid-template-columns: 88px 1fr 110px 72px;
      padding: 18px 44px;
      border-bottom: 1px solid var(--border);
      position: relative;
      animation: fadeUp 0.3s ease both;
    }
    .class-row.now { background: var(--gold-dim); }
    .class-row.now::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
    }
    .class-row.past { opacity: 0.25; }
    .class-row.tomorrow { opacity: 0.65; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Time cell */
    .time-start {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--gold);
      line-height: 1.2;
    }
    .time-end { font-size: 0.67rem; color: var(--text-dim); margin-top: 4px; }

    /* Class info cell */
    .class-info { padding-right: 10px; }
    .class-name {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
    }
    .class-zone {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }
    .class-zone span {
      display: inline-block;
      background: rgba(200,168,75,0.08);
      border: 1px solid rgba(200,168,75,0.2);
      border-radius: 2px;
      padding: 1px 6px;
    }

    /* Instructor cell */
    .class-instructor {
      font-size: 0.78rem;
      color: var(--text-mid);
      align-self: center;
      padding-right: 8px;
      line-height: 1.4;
      font-weight: 300;
    }

    /* Spots cell */
    .class-spots { text-align: right; align-self: center; }
    .spots-num { font-size: 1.25rem; font-weight: 500; line-height: 1; }
    .spots-num.open { color: #7BBF90; }
    .spots-num.low  { color: #C9A870; }
    .spots-num.full { color: #C97070; }
    .spots-lbl {
      font-size: 0.52rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    .list-state {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      height: 200px;
      color: var(--text-dim);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    /* Footer */
    .footer {
      padding: 14px 44px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .footer-left {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .footer-right { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.06em; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading" class="screen">
    <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
    <div class="spinner"></div>
    <p>Loading today's schedule...</p>
  </div>

  <!-- Error -->
  <div id="error-screen" class="screen" style="display:none;">
    <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
    <div class="sep"></div>
    <p id="error-msg">Unable to connect. Please check configuration.</p>
  </div>

  <!-- Timetable -->
  <div id="app">
    <div class="header">
      <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
      <div class="header-rule"></div>
      <div class="header-meta">
        <div class="header-date" id="header-date"></div>
        <div class="live"><span class="live-dot"></span>Live</div>
      </div>
    </div>

    <div class="col-heads">
      <div class="col-head">Time</div>
      <div class="col-head">Class</div>
      <div class="col-head">Instructor</div>
      <div class="col-head" style="text-align:right">Spots</div>
    </div>

    <div id="classes-list">
      <div class="list-state"><div class="spinner"></div></div>
    </div>

    <div class="footer">
      <div class="footer-left">Today's Schedule &nbsp;·&nbsp; 180–192 Ann Street, Brisbane</div>
      <div class="footer-right" id="footer-time"></div>
    </div>
  </div>

  <script>
    const WORKER_URL   = 'https://atria-timetable-proxy.nitai-whitehurst.workers.dev';
    const REFRESH_MINS = 5;

    const pad = n => String(n).padStart(2, '0');
    const bne = d =>
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}` +
      `T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}+10:00`;

    const fmt = iso => new Date(iso).toLocaleTimeString('en-AU', {
      hour: '2-digit', minute: '2-digit', hour12: true
    });

    const fmtDate = d => d.toLocaleDateString('en-AU', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });

    const fmtDateShort = d => d.toLocaleDateString('en-AU', {
      weekday: 'long', day: 'numeric', month: 'long'
    });

    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth()    === b.getMonth()    &&
             a.getDate()     === b.getDate();
    }

    function showError(msg) {
      document.getElementById('loading').style.display      = 'none';
      document.getElementById('app').style.display          = 'none';
      document.getElementById('error-screen').style.display = 'flex';
      document.getElementById('error-msg').textContent      = msg || 'Unable to connect.';
    }

    function showApp() {
      document.getElementById('loading').style.display      = 'none';
      document.getElementById('error-screen').style.display = 'none';
      document.getElementById('app').style.display          = 'flex';
      document.getElementById('header-date').textContent    = fmtDate(new Date());
    }

    async function loadClasses() {
      const now = new Date();

      const todayStart = new Date(now); todayStart.setHours(0, 0, 0, 0);
      const tmrwEnd    = new Date(now);
      tmrwEnd.setDate(tmrwEnd.getDate() + 1);
      tmrwEnd.setHours(23, 59, 59, 0);

      const params = new URLSearchParams({
        startDate: bne(todayStart),
        endDate:   bne(tmrwEnd),
      });

      try {
        const res = await fetch(`${WORKER_URL}?${params}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const data = await res.json();
        const classes = (data.value || []).filter(c => c.classType);

        renderClasses(classes, now);
        document.getElementById('footer-time').textContent = `Updated ${fmt(now.toISOString())}`;
        showApp();

      } catch (e) {
        console.error('Load error:', e);
        if (document.getElementById('app').style.display === 'flex') {
          document.getElementById('classes-list').innerHTML =
            '<div class="list-state"><span>Unable to load — retrying shortly</span></div>';
        } else {
          showError(`Unable to load schedule: ${e.message}`);
        }
      }
    }

    function renderClasses(classes, now) {
      const list = document.getElementById('classes-list');

      if (!classes.length) {
        list.innerHTML = '<div class="list-state"><span>No classes scheduled</span></div>';
        return;
      }

      classes.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

      const today    = new Date(now);
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);

      // Split into today and tomorrow
      const todayClasses = classes.filter(c => isSameDay(new Date(c.startDate), today));
      const tmrwClasses  = classes.filter(c => isSameDay(new Date(c.startDate), tomorrow));

      let html = '';

      // Today section
      if (todayClasses.length) {
        html += `<div class="day-divider">
          <span class="day-divider-label">Today · ${fmtDateShort(today)}</span>
          <span class="day-divider-line"></span>
        </div>`;
        html += todayClasses.map((c, i) => renderRow(c, i, now, false)).join('');
      }

      // Tomorrow section — only shown if today has classes or it's end of day
      if (tmrwClasses.length) {
        html += `<div class="day-divider" style="margin-top:4px">
          <span class="day-divider-label">Tomorrow · ${fmtDateShort(tomorrow)}</span>
          <span class="day-divider-line"></span>
        </div>`;
        html += tmrwClasses.map((c, i) => renderRow(c, i, now, true)).join('');
      }

      list.innerHTML = html || '<div class="list-state"><span>No classes scheduled</span></div>';
    }

    function renderRow(c, i, now, isTomorrow) {
      const start  = new Date(c.startDate);
      const end    = new Date(c.endDate);
      const isNow  = !isTomorrow && now >= start && now <= end;
      const isPast = !isTomorrow && now > end;

      const limit = c.attendeesLimit || 0;
      const taken = c.attendeesCount || 0;
      const left  = Math.max(0, limit - taken);
      const spotsClass = limit === 0 ? '' : left === 0 ? 'full' : left <= 3 ? 'low' : 'open';

      const instructor = c.instructor
        ? `${c.instructor.firstName} ${c.instructor.lastName}`.trim()
        : '—';

      const name = c.classType?.name || 'Class';

      // Zone / room name — from expanded ClubZone, fallback to clubZoneId
      const zone = c.clubZone?.name || c.clubZone?.shortName || null;

      const rowClass = isNow ? 'now' : isPast ? 'past' : isTomorrow ? 'tomorrow' : '';

      return `
        <div class="class-row ${rowClass}" style="animation-delay:${i * 0.04}s">
          <div>
            <div class="time-start">${fmt(c.startDate)}</div>
            <div class="time-end">${fmt(c.endDate)}</div>
          </div>
          <div class="class-info">
            <div class="class-name">${name}</div>
            ${zone ? `<div class="class-zone"><span>${zone}</span></div>` : ''}
          </div>
          <div class="class-instructor">${instructor}</div>
          <div class="class-spots">
            ${limit
              ? `<div class="spots-num ${spotsClass}">${left}</div>
                 <div class="spots-lbl">spots</div>`
              : `<div class="spots-lbl" style="margin-top:8px">Open</div>`
            }
          </div>
        </div>`;
    }

    loadClasses();
    setInterval(loadClasses, REFRESH_MINS * 60 * 1000);
  </script>

</body>
</html>
