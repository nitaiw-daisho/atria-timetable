<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atria Wellness Club – Today's Classes</title>
  <style>
    :root {
      --bg:        #0D0D0D;
      --bg2:       #141414;
      --bg3:       #111111;
      --gold:      #C8A84B;
      --gold-dim:  rgba(200,168,75,0.12);
      --gold-line: rgba(200,168,75,0.35);
      --text:      #F2EEE6;
      --text-mid:  rgba(242,238,230,0.6);
      --text-dim:  rgba(242,238,230,0.35);
      --border:    rgba(242,238,230,0.08);
      --font: 'Century Gothic', 'Trebuchet MS', 'Gill Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      overflow: hidden;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 28px;
      padding: 60px;
      text-align: center;
    }
    .screen img { width: 220px; filter: brightness(1.1); }
    .screen p {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      max-width: 340px;
      line-height: 1.8;
    }
    .sep { width: 48px; height: 1px; background: var(--gold); opacity: 0.5; }
    .spinner {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header { padding: 36px 48px 24px; flex-shrink: 0; }
    .header img {
      width: 200px;
      display: block;
      margin-bottom: 24px;
      filter: brightness(1.1);
    }
    .header-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--gold) 0%, transparent 60%);
      opacity: 0.45;
      margin-bottom: 18px;
    }
    .header-meta { display: flex; justify-content: space-between; align-items: center; }
    .header-date {
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-mid);
    }
    .live {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .live-dot {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .col-heads {
      display: grid;
      grid-template-columns: 105px 1fr 140px 82px;
      padding: 13px 48px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .col-head {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
    }

    #classes-list { flex: 1; overflow-y: auto; }
    #classes-list::-webkit-scrollbar { width: 2px; }
    #classes-list::-webkit-scrollbar-thumb { background: var(--gold-line); }

    .day-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 48px 12px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .day-divider-label {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      white-space: nowrap;
    }
    .day-divider-line { flex: 1; height: 1px; background: var(--border); }

    .class-row {
      display: grid;
      grid-template-columns: 105px 1fr 140px 82px;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      position: relative;
      animation: fadeUp 0.4s ease both;
    }
    .class-row.now { background: var(--gold-dim); }
    .class-row.now::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
    }
    .class-row.tomorrow { opacity: 0.6; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .time-start {
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--gold);
      line-height: 1.2;
    }
    .time-end { font-size: 0.78rem; color: var(--text-dim); margin-top: 5px; }

    .now-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(200,168,75,0.12);
      border: 1px solid rgba(200,168,75,0.25);
      border-radius: 2px;
      padding: 3px 8px;
    }
    .now-badge-dot {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .class-info { padding-right: 12px; align-self: center; }
    .class-name {
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
    }
    .class-zone { font-size: 0.72rem; color: var(--text-dim); margin-top: 6px; }
    .class-zone span {
      display: inline-block;
      background: rgba(200,168,75,0.07);
      border: 1px solid rgba(200,168,75,0.18);
      border-radius: 2px;
      padding: 2px 8px;
      letter-spacing: 0.04em;
    }

    .class-instructor {
      font-size: 0.9rem;
      color: var(--text-mid);
      align-self: center;
      padding-right: 10px;
      line-height: 1.5;
      font-weight: 300;
    }

    .class-spots { text-align: right; align-self: center; }
    .spots-num { font-size: 1.5rem; font-weight: 500; line-height: 1; }
    .spots-num.open { color: #7BBF90; }
    .spots-num.low  { color: #C9A870; }
    .spots-num.full { color: #C97070; }
    .spots-lbl {
      font-size: 0.6rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 5px;
    }
    .spots-open-text { font-size: 0.72rem; color: #7BBF90; letter-spacing: 0.08em; text-transform: uppercase; }

    .list-state {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      height: 220px;
      color: var(--text-dim);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .footer {
      padding: 16px 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .footer-left {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .footer-right { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.06em; }
  </style>
</head>
<body>

  <div id="loading" class="screen">
    <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
    <div class="spinner"></div>
    <p>Loading today's schedule...</p>
  </div>

  <div id="error-screen" class="screen" style="display:none;">
    <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
    <div class="sep"></div>
    <p id="error-msg">Unable to connect. Please check configuration.</p>
  </div>

  <div id="app">
    <div class="header">
      <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
      <div class="header-rule"></div>
      <div class="header-meta">
        <div class="header-date" id="header-date"></div>
        <div class="live"><span class="live-dot"></span>Live</div>
      </div>
    </div>

    <div class="col-heads">
      <div class="col-head">Time</div>
      <div class="col-head">Class</div>
      <div class="col-head">Instructor</div>
      <div class="col-head" style="text-align:right">Spots</div>
    </div>

    <div id="classes-list">
      <div class="list-state"><div class="spinner"></div></div>
    </div>

    <div class="footer">
      <div class="footer-left">Today's Schedule &nbsp;·&nbsp; 180–192 Ann Street, Brisbane</div>
      <div class="footer-right" id="footer-time"></div>
    </div>
  </div>

  <script>
    const WORKER_URL   = 'https://atria-timetable-proxy.nitai-whitehurst.workers.dev';
    const REFRESH_MINS = 5;
    const TICK_SECS    = 30;

    const pad = n => String(n).padStart(2, '0');
    const bne = d =>
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}` +
      `T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}+10:00`;

    const fmt = iso => new Date(iso).toLocaleTimeString('en-AU', {
      hour: '2-digit', minute: '2-digit', hour12: true
    });
    const fmtDate = d => d.toLocaleDateString('en-AU', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
    const fmtDateShort = d => d.toLocaleDateString('en-AU', {
      weekday: 'long', day: 'numeric', month: 'long'
    });

    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth()    === b.getMonth()    &&
             a.getDate()     === b.getDate();
    }

    function showError(msg) {
      document.getElementById('loading').style.display      = 'none';
      document.getElementById('app').style.display          = 'none';
      document.getElementById('error-screen').style.display = 'flex';
      document.getElementById('error-msg').textContent      = msg || 'Unable to connect.';
    }

    function showApp() {
      document.getElementById('loading').style.display      = 'none';
      document.getElementById('error-screen').style.display = 'none';
      document.getElementById('app').style.display          = 'flex';
      document.getElementById('header-date').textContent    = fmtDate(new Date());
    }

    let cachedClasses = [];

    async function loadClasses() {
      const now = new Date();
      const todayStart = new Date(now); todayStart.setHours(0, 0, 0, 0);
      const tmrwEnd    = new Date(now);
      tmrwEnd.setDate(tmrwEnd.getDate() + 1);
      tmrwEnd.setHours(23, 59, 59, 0);

      const params = new URLSearchParams({
        startDate: bne(todayStart),
        endDate:   bne(tmrwEnd),
      });

      try {
        const res = await fetch(`${WORKER_URL}?${params}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        const data = await res.json();

        // Only show classes that are NOT deleted — matches what PG calendar shows
        cachedClasses = (data.value || []).filter(c =>
          c.classType &&
          c.isDeleted === false &&
          c.classType.isDeleted === false
        );
        cachedClasses.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

        renderClasses(now);
        document.getElementById('footer-time').textContent = `Updated ${fmt(now.toISOString())}`;
        showApp();
      } catch (e) {
        console.error('Load error:', e);
        if (document.getElementById('app').style.display === 'flex') {
          document.getElementById('footer-time').textContent = `Update failed — retrying`;
        } else {
          showError(`Unable to load schedule: ${e.message}`);
        }
      }
    }

    function tick() {
      if (cachedClasses.length && document.getElementById('app').style.display === 'flex') {
        renderClasses(new Date());
        document.getElementById('header-date').textContent = fmtDate(new Date());
      }
    }

    function renderClasses(now) {
      const list     = document.getElementById('classes-list');
      const today    = new Date(now);
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);

      const visible      = cachedClasses.filter(c => new Date(c.endDate) > now);
      const todayClasses = visible.filter(c => isSameDay(new Date(c.startDate), today));
      const tmrwClasses  = visible.filter(c => isSameDay(new Date(c.startDate), tomorrow));

      if (!todayClasses.length && !tmrwClasses.length) {
        list.innerHTML = '<div class="list-state"><span>No upcoming classes today</span></div>';
        return;
      }

      let html = '';

      if (todayClasses.length) {
        html += `<div class="day-divider">
          <span class="day-divider-label">Today · ${fmtDateShort(today)}</span>
          <span class="day-divider-line"></span>
        </div>`;
        html += todayClasses.map((c, i) => renderRow(c, i, now, false)).join('');
      }

      if (tmrwClasses.length) {
        html += `<div class="day-divider" style="margin-top:6px">
          <span class="day-divider-label">Tomorrow · ${fmtDateShort(tomorrow)}</span>
          <span class="day-divider-line"></span>
        </div>`;
        html += tmrwClasses.map((c, i) => renderRow(c, i, now, true)).join('');
      }

      list.innerHTML = html;
    }

    function renderRow(c, i, now, isTomorrow) {
      const start = new Date(c.startDate);
      const end   = new Date(c.endDate);
      const isNow = !isTomorrow && now >= start && now < end;

      const limit = c.attendeesLimit || 0;
      const taken = c.attendeesCount || 0;
      const left  = Math.max(0, limit - taken);

      const instructor = c.instructor
        ? `${c.instructor.firstName} ${c.instructor.lastName}`.trim()
        : '—';

      const name = c.classType?.name || 'Class';
      const zone = c.clubZone?.name || c.clubZone?.shortName || null;
      const rowClass = isNow ? 'now' : isTomorrow ? 'tomorrow' : '';

      const timeCell = isNow
        ? `<div class="time-start">${fmt(c.startDate)}</div>
           <div class="now-badge"><span class="now-badge-dot"></span>In Progress</div>`
        : `<div class="time-start">${fmt(c.startDate)}</div>
           <div class="time-end">${fmt(c.endDate)}</div>`;

      let spotsHtml;
      if (limit === 0) {
        spotsHtml = `<div class="spots-open-text">Open</div>`;
      } else if (left === 0) {
        spotsHtml = `<div class="spots-num full">Full</div>`;
      } else {
        const spotsClass = left <= 3 ? 'low' : 'open';
        spotsHtml = `<div class="spots-num ${spotsClass}">${left}</div>
                     <div class="spots-lbl">spots</div>`;
      }

      return `
        <div class="class-row ${rowClass}" style="animation-delay:${i * 0.04}s">
          <div>${timeCell}</div>
          <div class="class-info">
            <div class="class-name">${name}</div>
            ${zone ? `<div class="class-zone"><span>${zone}</span></div>` : ''}
          </div>
          <div class="class-instructor">${instructor}</div>
          <div class="class-spots">${spotsHtml}</div>
        </div>`;
    }

    loadClasses();
    setInterval(loadClasses, REFRESH_MINS * 60 * 1000);
    setInterval(tick, TICK_SECS * 1000);
  </script>

</body>
</html>
