<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atria Wellness Club – Today's Classes</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0D0D0D;
      --bg2:       #141414;
      --gold:      #C8A84B;
      --gold-dim:  rgba(200,168,75,0.12);
      --gold-line: rgba(200,168,75,0.35);
      --text:      #F2EEE6;
      --text-mid:  rgba(242,238,230,0.6);
      --text-dim:  rgba(242,238,230,0.35);
      --border:    rgba(242,238,230,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── Screens ── */
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      padding: 40px;
      text-align: center;
    }

    .screen img { width: 150px; filter: brightness(1.1); }

    .screen p {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      max-width: 280px;
      line-height: 1.8;
    }

    .sep { width: 40px; height: 1px; background: var(--gold); opacity: 0.5; }

    .spinner {
      width: 22px; height: 22px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main app ── */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header { padding: 30px 28px 22px; flex-shrink: 0; }

    .header img {
      width: 130px;
      display: block;
      margin-bottom: 16px;
      filter: brightness(1.1);
    }

    .header-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--gold) 0%, transparent 65%);
      opacity: 0.45;
      margin-bottom: 12px;
    }

    .header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-date {
      font-size: 0.67rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .live {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Column headers */
    .col-heads {
      display: grid;
      grid-template-columns: 68px 1fr 95px 68px;
      padding: 8px 28px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .col-head {
      font-size: 0.57rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Class rows */
    #classes-list { flex: 1; overflow-y: auto; }

    #classes-list::-webkit-scrollbar { width: 2px; }
    #classes-list::-webkit-scrollbar-thumb { background: var(--gold-line); }

    .class-row {
      display: grid;
      grid-template-columns: 68px 1fr 95px 68px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      position: relative;
      animation: fadeUp 0.3s ease both;
    }

    .class-row.now { background: var(--gold-dim); }
    .class-row.now::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--gold);
    }

    .class-row.past { opacity: 0.28; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .time-start {
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--gold);
      line-height: 1.2;
    }

    .time-end { font-size: 0.6rem; color: var(--text-dim); margin-top: 3px; }

    .class-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.08rem;
      color: var(--text);
      line-height: 1.2;
      padding-right: 8px;
    }

    .class-instructor {
      font-size: 0.74rem;
      color: var(--text-mid);
      align-self: center;
      padding-right: 6px;
      line-height: 1.4;
    }

    .class-spots { text-align: right; align-self: center; }

    .spots-num { font-size: 1.05rem; font-weight: 500; line-height: 1; }
    .spots-num.open { color: #7BBF90; }
    .spots-num.low  { color: #C9A870; }
    .spots-num.full { color: #C97070; }

    .spots-lbl {
      font-size: 0.55rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    .list-state {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      height: 160px;
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
    }

    /* Footer */
    .footer {
      padding: 10px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-left {
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .footer-right { font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.05em; }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading" class="screen">
    <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
    <div class="spinner"></div>
    <p>Loading today's schedule...</p>
  </div>

  <!-- Error screen -->
  <div id="error-screen" class="screen" style="display:none;">
    <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
    <div class="sep"></div>
    <p id="error-msg">Unable to connect. Please check configuration.</p>
  </div>

  <!-- Timetable -->
  <div id="app">
    <div class="header">
      <img src="https://www.daisho-aus.com/wp-content/uploads/2025/07/logo-atria.png" alt="Atria Wellness Club">
      <div class="header-rule"></div>
      <div class="header-meta">
        <div class="header-date" id="header-date"></div>
        <div class="live"><span class="live-dot"></span>Live</div>
      </div>
    </div>

    <div class="col-heads">
      <div class="col-head">Time</div>
      <div class="col-head">Class</div>
      <div class="col-head">Instructor</div>
      <div class="col-head" style="text-align:right">Spots</div>
    </div>

    <div id="classes-list">
      <div class="list-state"><div class="spinner"></div></div>
    </div>

    <div class="footer">
      <div class="footer-left">Today's Schedule &nbsp;·&nbsp; 180–192 Ann Street, Brisbane</div>
      <div class="footer-right" id="footer-time"></div>
    </div>
  </div>


  <script>
    // ── Config ──────────────────────────────────────────────────
    const WORKER_URL  = 'https://atria-timetable-proxy.nitai-whitehurst.workers.dev';
    const REFRESH_MINS = 5;
    // ────────────────────────────────────────────────────────────

    const fmt = iso => new Date(iso).toLocaleTimeString('en-AU', {
      hour: '2-digit', minute: '2-digit', hour12: true
    });

    const fmtDate = d => d.toLocaleDateString('en-AU', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });

    function showError(msg) {
      document.getElementById('loading').style.display      = 'none';
      document.getElementById('app').style.display          = 'none';
      document.getElementById('error-screen').style.display = 'flex';
      document.getElementById('error-msg').textContent      = msg || 'Unable to connect.';
    }

    function showApp() {
      document.getElementById('loading').style.display      = 'none';
      document.getElementById('error-screen').style.display = 'none';
      document.getElementById('app').style.display          = 'flex';
      document.getElementById('header-date').textContent    = fmtDate(new Date());
    }

    async function loadClasses() {
      const now   = new Date();

      // Build Brisbane-offset date strings for the Worker
      const pad = n => String(n).padStart(2, '0');
      const bne = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}+10:00`;

      const start = new Date(now); start.setHours(0, 0, 0, 0);
      const end   = new Date(now); end.setHours(23, 59, 59, 0);

      const params = new URLSearchParams({
        startDate: bne(start),
        endDate:   bne(end),
      });

      try {
        const res = await fetch(`${WORKER_URL}?${params}`);

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const data = await res.json();

        // v2.2 OData returns results in data.value array
        // Filter out deleted classes and sort by start time
        const classes = (data.value || [])
          .filter(c => !c.isDeleted && !c.classType?.isDeleted);

        renderClasses(classes, now);
        document.getElementById('footer-time').textContent = `Updated ${fmt(now.toISOString())}`;
        showApp();

      } catch (e) {
        console.error('Load error:', e);
        if (document.getElementById('app').style.display === 'flex') {
          document.getElementById('classes-list').innerHTML =
            '<div class="list-state"><span>Unable to load — retrying shortly</span></div>';
        } else {
          showError(`Unable to load schedule: ${e.message}`);
        }
      }
    }

    function renderClasses(classes, now) {
      const list = document.getElementById('classes-list');

      if (!classes.length) {
        list.innerHTML = '<div class="list-state"><span>No classes scheduled for today</span></div>';
        return;
      }

      // Sort by start time
      classes.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

      list.innerHTML = classes.map((c, i) => {
        const start  = new Date(c.startDate);
        const end    = new Date(c.endDate);
        const isNow  = now >= start && now <= end;
        const isPast = now > end;

        // Spots available
        const limit = c.attendeesLimit || 0;
        const taken = c.attendeesCount || 0;
        const left  = Math.max(0, limit - taken);
        const spotsClass = limit === 0 ? '' : left === 0 ? 'full' : left <= 3 ? 'low' : 'open';

        // Instructor name — handle null instructor gracefully
        const instructor = c.instructor
          ? `${c.instructor.firstName} ${c.instructor.lastName}`.trim()
          : '—';

        // Class name from classType
        const name = c.classType?.name || 'Class';

        return `
          <div class="class-row ${isNow ? 'now' : isPast ? 'past' : ''}"
               style="animation-delay:${i * 0.03}s">
            <div>
              <div class="time-start">${fmt(c.startDate)}</div>
              <div class="time-end">${fmt(c.endDate)}</div>
            </div>
            <div>
              <div class="class-name">${name}</div>
            </div>
            <div class="class-instructor">${instructor}</div>
            <div class="class-spots">
              ${limit
                ? `<div class="spots-num ${spotsClass}">${left}</div>
                   <div class="spots-lbl">spots</div>`
                : `<div class="spots-lbl" style="margin-top:6px">Open</div>`
              }
            </div>
          </div>`;
      }).join('');
    }

    // Start and auto-refresh
    loadClasses();
    setInterval(loadClasses, REFRESH_MINS * 60 * 1000);
  </script>

</body>
</html>
