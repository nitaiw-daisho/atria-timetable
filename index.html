<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atria Wellness Club – Today's Classes</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E2C97E;
      --gold-dim: rgba(201,168,76,0.15);
      --bg: #0A0A0A;
      --bg2: #111111;
      --bg3: #1A1A1A;
      --text: #F0EDE6;
      --text-dim: rgba(240,237,230,0.5);
      --border: rgba(201,168,76,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    /* ── SETUP SCREEN ── */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      padding: 40px;
      background: var(--bg);
    }

    #setup h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-align: center;
    }

    #setup p {
      color: var(--text-dim);
      font-size: 0.85rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      max-width: 360px;
    }

    .input-group label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .input-group input {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--gold); }

    .btn {
      background: var(--gold);
      color: #0A0A0A;
      border: none;
      padding: 14px 40px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
      width: 100%;
      max-width: 360px;
    }

    .btn:hover { background: var(--gold-light); }

    #error-msg {
      color: #E07070;
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }

    /* ── TIMETABLE SCREEN ── */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .club-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .club-name span { color: var(--gold); }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .live-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .date-line {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .col-headers {
      display: grid;
      grid-template-columns: 70px 1fr 1fr 80px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }

    .col-header {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
    }

    #classes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #classes-list::-webkit-scrollbar { width: 3px; }
    #classes-list::-webkit-scrollbar-track { background: transparent; }
    #classes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .class-row {
      display: grid;
      grid-template-columns: 70px 1fr 1fr 80px;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      animation: fadeIn 0.4s ease both;
    }

    .class-row.active {
      background: var(--gold-dim);
      border-left: 2px solid var(--gold);
      padding-left: 22px;
    }

    .class-row.past { opacity: 0.35; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .class-time {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gold-light);
      line-height: 1.3;
    }

    .class-time-end {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .class-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
    }

    .class-zone {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 3px;
      letter-spacing: 0.05em;
    }

    .class-instructor {
      font-size: 0.8rem;
      color: var(--text-dim);
      align-self: center;
    }

    .class-spots {
      text-align: right;
      align-self: center;
    }

    .spots-num {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .spots-num.low { color: #E07070; }
    .spots-num.good { color: #70C090; }

    .spots-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: var(--bg);
    }

    .footer-text {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .refresh-time {
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .state-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 12px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .gold-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 24px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>ATRIA<br><span>Wellness Club</span></h1>
  <p>Enter your Perfect Gym admin credentials to connect the live class timetable.</p>

  <div class="input-group">
    <label>Username / Email</label>
    <input type="text" id="pg-user" placeholder="admin@atriawellness.com.au" autocomplete="off">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="pg-pass" placeholder="••••••••">
  </div>

  <div id="error-msg"></div>

  <button class="btn" onclick="login()">Connect Timetable</button>
  <p style="font-size:0.7rem; opacity:0.4;">Credentials stored in session only — not saved anywhere</p>
</div>

<!-- TIMETABLE SCREEN -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="club-name">ATRIA <span>Wellness Club</span></div>
      <div class="live-label"><span class="live-dot"></span>Live</div>
    </div>
    <div class="date-line" id="date-line"></div>
  </div>

  <div class="col-headers">
    <div class="col-header">Time</div>
    <div class="col-header">Class</div>
    <div class="col-header">Instructor</div>
    <div class="col-header" style="text-align:right">Spots</div>
  </div>

  <div id="classes-list">
    <div class="state-msg"><div class="spinner"></div><span>Loading classes...</span></div>
  </div>

  <div class="gold-line"></div>

  <div class="footer">
    <div class="footer-text">Today's Schedule</div>
    <div class="refresh-time" id="refresh-time"></div>
  </div>
</div>

<script>
  const BASE = 'https://atriawellnessclub.perfectgym.com.au';
  let token = null;

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  async function login() {
    const username = document.getElementById('pg-user').value.trim();
    const password = document.getElementById('pg-pass').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!username || !password) {
      errEl.textContent = 'Please enter your username and password.';
      errEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch(`${BASE}/Api/Auth/Login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login: username, password: password })
      });

      if (!res.ok) throw new Error('Login failed');
      const data = await res.json();
      token = data.authToken || data.token || data.access_token;
      if (!token) throw new Error('No token');

      document.getElementById('setup').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('date-line').textContent = formatDate(new Date());

      await loadClasses();
      setInterval(loadClasses, 5 * 60 * 1000); // refresh every 5 min

    } catch (e) {
      errEl.textContent = 'Login failed. Please check your credentials.';
      errEl.style.display = 'block';
    }
  }

  async function loadClasses() {
    const now = new Date();
    const start = new Date(now); start.setHours(0,0,0,0);
    const end = new Date(now); end.setHours(23,59,59,0);

    try {
      const res = await fetch(
        `${BASE}/Api/Classes/Classes?clubId=1&startDate=${start.toISOString().slice(0,19)}&endDate=${end.toISOString().slice(0,19)}`,
        { headers: { 'Authorization': `Bearer ${token}` } }
      );
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderClasses(data.elements || data || [], now);
      document.getElementById('refresh-time').textContent = `Updated ${formatTime(now.toISOString())}`;
    } catch {
      document.getElementById('classes-list').innerHTML =
        '<div class="state-msg"><span>Unable to load classes. Will retry shortly.</span></div>';
    }
  }

  function renderClasses(classes, now) {
    const list = document.getElementById('classes-list');
    if (!classes.length) {
      list.innerHTML = '<div class="state-msg"><span>No classes scheduled for today.</span></div>';
      return;
    }

    classes.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

    list.innerHTML = classes.map((c, i) => {
      const start = new Date(c.startDate);
      const end = new Date(c.endDate);
      const isActive = now >= start && now <= end;
      const isPast = now > end;
      const spotsLeft = (c.attendeesLimit || 0) - (c.attendeesCount || 0);
      const spotsClass = spotsLeft <= 3 ? 'low' : spotsLeft <= 8 ? '' : 'good';
      const instructor = c.instructor
        ? (c.instructor.displayName || `${c.instructor.firstName} ${c.instructor.lastName}`)
        : '—';
      const className = c.classType ? c.classType.name : (c.name || 'Class');
      const zone = c.clubZone || '';

      return `
        <div class="class-row ${isActive ? 'active' : isPast ? 'past' : ''}" style="animation-delay:${i * 0.04}s">
          <div>
            <div class="class-time">${formatTime(c.startDate)}</div>
            <div class="class-time-end">${formatTime(c.endDate)}</div>
          </div>
          <div>
            <div class="class-name">${className}</div>
            ${zone ? `<div class="class-zone">${zone}</div>` : ''}
          </div>
          <div class="class-instructor">${instructor}</div>
          <div class="class-spots">
            ${c.attendeesLimit
              ? `<div class="spots-num ${spotsClass}">${Math.max(0, spotsLeft)}</div><div class="spots-label">spots</div>`
              : '<div class="spots-label" style="padding-top:4px">Open</div>'
            }
          </div>
        </div>`;
    }).join('');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
