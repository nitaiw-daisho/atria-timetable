<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@perfectgym/client-portal@latest/dist/ClientPortal.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }

</head>
<body>

    window.onload = function () {
      var ClientPortal = window.PerfectGym.ClientPortal;
      var el = document.getElementById('pg-client-portal');
      var options = {
        url: "https://atriawellnessclub.perfectgym.com.au/ClientPortal2/",
        forceUrl: "https://atriawellnessclub.perfectgym.com.au/ClientPortal2/#/Classes/1/List"
      };
      new ClientPortal(el, options);
